<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a1140"/>
      <stop offset="60%" stop-color="#0b0720"/>
      <stop offset="100%" stop-color="#05030f"/>
    </radialGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8f83ff"/>
      <stop offset="50%" stop-color="#d94bd0"/>
      <stop offset="100%" stop-color="#7ce7f5"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ce7f5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7ce7f5"/>
      <stop offset="100%" stop-color="#7ce7f5" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#sky)"/>
  <!-- orbital rings -->
  <g filter="url(#glow)" opacity="0.85">
    <ellipse cx="64" cy="58" rx="46" ry="16" fill="none" stroke="url(#ring)" stroke-width="2" transform="rotate(-18 64 58)"/>
    <ellipse cx="64" cy="58" rx="52" ry="20" fill="none" stroke="url(#ring)" stroke-width="1.4" opacity="0.6" transform="rotate(14 64 58)"/>
  </g>
  <!-- trunk -->
  <path d="M64 108 C62 92 61 84 62 74 C62.5 69 63 65 64 60" fill="none" stroke="#3a416b" stroke-width="6" stroke-linecap="round"/>
  <path d="M64 84 C60 80 55 78 50 79 M64 76 C69 72 74 71 79 73" fill="none" stroke="#3a416b" stroke-width="4" stroke-linecap="round"/>
  <!-- canopy: glowing orb cluster -->
  <g filter="url(#glow)">
    <circle cx="64" cy="52" r="22" fill="url(#canopy)" opacity="0.28"/>
    <circle cx="55" cy="50" r="5.5" fill="#ff6b7a"/>
    <circle cx="72" cy="47" r="5" fill="#ffb057"/>
    <circle cx="64" cy="40" r="5.5" fill="#7ce7f5"/>
    <circle cx="76" cy="58" r="4.5" fill="#a78bfa"/>
    <circle cx="52" cy="60" r="4.5" fill="#d94bd0"/>
    <circle cx="64" cy="56" r="4" fill="#8f83ff"/>
  </g>
  <!-- core star -->
  <circle cx="64" cy="50" r="2.6" fill="#fff"/>
</svg>
