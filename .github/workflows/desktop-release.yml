name: Desktop release

# Tag `app-v0.1.0` (etc.) to build installers for Windows/macOS/Linux and
# publish a GitHub Release with updater artifacts (latest.json). The site
# workflow then picks the release up and refreshes the download page.
on:
  push:
    tags: ["app-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest # arm64 (Apple Silicon)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # x86_64 (Intel)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || contains(matrix.args, 'x86_64-apple') && 'x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: node scripts/generate-inventory.mjs
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # windows-msvc rustc overflows its stack compiling tauri-macros 2.6.3
          # (0xc0000409) — give it a big stack; harmless on mac/linux
          RUST_MIN_STACK: "536870912"
          # updater artifact signing (NOT OS code signing):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # OS code signing — deferred; uncomment when certificates exist:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        with:
          projectPath: apps/desktop
          tagName: app-v__VERSION__
          releaseName: "Claude Galaxy v__VERSION__"
          releaseBody: "See the changelog on the site. Built from source by CI."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
